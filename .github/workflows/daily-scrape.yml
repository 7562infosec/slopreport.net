name: Daily Slop Report Scrape
on:
  schedule:
    # Run at 08:00 UTC every day
    - cron: "0 5 * * *"
  # Allow manual triggering from the Actions tab
  workflow_dispatch:
    inputs:
      backfill_date:
        description: 'Backfill date (YYYY-MM-DD), leave empty for today'
        required: false
        default: ''

permissions:
  contents: write # Required to commit and push the new post

concurrency:
  group: slopreport-scrape
  cancel-in-progress: false

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          # Fetch full history so git push works correctly
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4.2.3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        run: python3 scripts/scrape.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BACKFILL_DATE: ${{ inputs.backfill_date }}

      - name: Check for new post
        id: check_changes
        run: |
          git add _posts/ scripts/seen_urls.json
          CHANGES=$(git status --porcelain _posts/ scripts/seen_urls.json)
          if [ -z "$CHANGES" ]; then
            echo "no_new_post=true" >> "$GITHUB_OUTPUT"
            echo "No new post generated today (no changes in _posts/)."
          else
            echo "no_new_post=false" >> "$GITHUB_OUTPUT"
            echo "New post detected:"
            git status --short _posts/ scripts/seen_urls.json
          fi

      - name: Commit and push new post
        if: steps.check_changes.outputs.no_new_post == 'false'
        run: |
          git config user.name "Slop Report Bot"
          git config user.email "claudeai@secnetmx.com"
          git add _posts/ scripts/seen_urls.json
          git commit -m "chore: add daily slop report $(date -u +%Y-%m-%d)"
          git push origin HEAD

      - name: Summary
        run: |
          if [ "${{ steps.check_changes.outputs.no_new_post }}" = "true" ]; then
            echo "### No new post today" >> "$GITHUB_STEP_SUMMARY"
            echo "The scraper ran but found no qualifying stories to publish." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### New post published" >> "$GITHUB_STEP_SUMMARY"
            echo "A new daily report was committed and pushed to main." >> "$GITHUB_STEP_SUMMARY"
            echo "GitHub Pages will deploy it automatically." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api repos/${{ github.repository }}/issues \
            --method POST \
            -f title="⚠️ Daily scrape failed — $(date -u +%Y-%m-%d)" \
            -f body="The daily scrape workflow failed. [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            -f 'labels[]=bug' || true
