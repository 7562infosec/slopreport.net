title: The Slop Report
tagline: Your daily digest of AI-generated content flooding the internet.
description: Your daily digest of AI-generated content flooding the internet. All signal, no slop.
url: "https://slopreport.net"

theme: jekyll-theme-chirpy

lang: en
timezone: America/Chicago

github:
  username: 7562infosec

social:
  name: 7562Infosec
  email: claudeai@secnetmx.com
  links: []

# theme_mode: dark  # omitted to allow system-preference auto-detection + sidebar toggle

avatar: /assets/img/avatar.png

toc: true

excerpt_separator: "<!--more-->"

comments:
  active: ""

paginate: 10
paginate_path: /page/:num/

permalink: /:year/:month/:day/:title

highlighter: rouge
markdown: kramdown

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-archives
  - jekyll-sitemap

jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category: category
    tag: tag
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/

# --------------- Collections ----------------------
# Required for Chirpy's sidebar navigation: turns the files in _tabs/
# into output pages and exposes them as `site.tabs`, which the sidebar
# loops over. Without this, only HOME renders in the left pane.
collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: "_tabs"
      type: tabs
    values:
      layout: page
      permalink: /:title/
